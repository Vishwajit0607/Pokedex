<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex Landing</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body id="page">

  <!-- NAVBAR -->
  <div class="navbar">
    <div>
      <button>HOME</button>
      <button>POKÉMON</button>
    </div>
    <div>
      <button>ABOUT</button>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="box">

      <!-- SEARCH BOX -->
      <div class="search-box">
        <h1>EXPLORE THE POKÉDEX</h1>
        <div class="search">
          <input type="text" id="searchInput" placeholder="Search Pokémon...">
          <button onclick="doSearch()">🔍</button>
        </div>
      </div>

      <!-- CTA -->
      <button class="cta">
        START YOUR ADVENTURE<br>
        <small>Discover all 1000+ Pokémon</small>
      </button>

    </div>
  </div>

  <script>
    document.getElementById('searchInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doSearch();
    });
    function doSearch() {
      const v = document.getElementById('searchInput').value.trim();
      if (v) alert('Searching for: ' + v);
    }
  </script>

</body>
</html>
